{% extends 'salon/base.html' %}

{% block title %}
Login - Fresh Cut Barbing Salon
{% endblock %}

{% block content %}

<div class="form-card">
    <h1>Customer Login</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p class="form-help">
        Don't have an account?
        <a href="/register/">Create Account</a>
    </p>
</div>

{% endblock %}
