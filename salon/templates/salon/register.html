{% extends 'salon/base.html' %}

{% block title %}
Create Account - Fresh Cut Barbing Salon
{% endblock %}

{% block content %}

<div class="form-card">
    <h1>Create Customer Account</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>
    </form>

    <p class="form-help">
        Already have an account?
        <a href="/login/">Login</a>
    </p>
</div>

{% endblock %}
